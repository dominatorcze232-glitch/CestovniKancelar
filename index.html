<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cestovní Kancelář - Funkční Systém</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; margin-top: 0; }
        .step { display: none; }
        .step.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 5px; }
        button:hover { background-color: #004085; }
        .hotel-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 4px; background: #fafafa; }
        .booking-list { list-style: none; padding: 0; }
        .booking-item { background: #eee; margin: 10px 0; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .booking-details { background: #fff; border: 1px solid #ccc; padding: 10px; margin-top: 5px; display: none; font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <div id="step-login" class="step active">
        <h2>Přihlášení do systému</h2>
        <div class="form-group">
            <label for="password">Zadejte heslo:</label>
            <input type="password" id="password" placeholder="Heslo">
        </div>
        <button onclick="checkPassword()">Vstoupit</button>
    </div>

    <div id="step-employee-main" class="step">
        <h2>Hlavní menu - Zaměstnanec</h2>
        <button onclick="nextStep('step-customer-name')">Nový Zákazník</button>
    </div>

    <div id="step-customer-name" class="step">
        <h2>Nový Zákazník - Osobní údaje</h2>
        <div class="form-group">
            <label>Jméno:</label>
            <input type="text" id="cust-name">
        </div>
        <div class="form-group">
            <label>Příjmení:</label>
            <input type="text" id="cust-surname">
        </div>
        <button onclick="saveNameAndGoNext()">Pokračovat</button>
    </div>

    <div id="step-travel-details" class="step">
        <h2>Detaily dovolené</h2>
        <div class="form-group">
            <label>Země:</label>
            <select id="travel-country">
                <option value="Egypt">Egypt</option>
                <option value="Řecko">Řecko</option>
                <option value="Španělsko">Španělsko</option>
                <option value="Itálie">Itálie</option>
            </select>
        </div>
        <div class="form-group">
            <label>Počet osob celkem:</label>
            <input type="number" id="count-total" min="1" value="2">
        </div>
        <div class="form-group">
            <label>Počet dospělých:</label>
            <input type="number" id="count-adults" min="1" value="2">
        </div>
        <div class="form-group">
            <label>Počet dětí:</label>
            <input type="number" id="count-kids" min="0" value="0">
        </div>
        <div class="form-group">
            <label>Na jak dlouho (dny):</label>
            <input type="number" id="travel-days" min="1" value="8">
        </div>
        <button onclick="generateHotels()">Najít hotely</button>
    </div>

    <div id="step-hotels" class="step">
        <h2>Nabídka hotelů</h2>
        <div id="hotels-list"></div>
    </div>

    <div id="step-success" class="step">
        <h2>Dovolená úspěšně zabookována!</h2>
        <p>Data byla uložena.</p>
        <button onclick="resetApp()">Zpět na začátek</button>
    </div>

    <div id="step-admin" class="step">
        <h2>Administrace - Přehled dovolených</h2>
        <ul id="admin-bookings-list" class="booking-list"></ul>
        <button onclick="resetApp()" style="background-color: #6c757d; margin-top: 20px;">Odhlásit se</button>
    </div>
</div>

<script>
    // Inicializace Firebase (Starší kompatibilní syntaxe)
    const firebaseConfig = {
        apiKey: "AIzaSyBg7z3WWtWrXwXVxDeuhjWkQuyD94ihc48",
        authDomain: "cestovnikancelar-e59bf.firebaseapp.com",
        databaseURL: "https://cestovnikancelar-e59bf-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cestovnikancelar-e59bf",
        storageBucket: "cestovnikancelar-e59bf.firebasestorage.app",
        messagingSenderId: "90287757875",
        appId: "1:90287757875:web:a5278e3a63415eee30a146"
    };

    let db = null;
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    } catch (e) {
        console.log("Firebase neběží na lokálním souboru, zapínám lokální režim.");
    }

    // Globální data
    window.currentBooking = {};

    function nextStep(stepId) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(stepId).classList.add('active');
    }

    function resetApp() {
        document.getElementById('password').value = '';
        document.getElementById('cust-name').value = '';
        document.getElementById('cust-surname').value = '';
        window.currentBooking = {};
        nextStep('step-login');
    }

    function checkPassword() {
        const pass = document.getElementById('password').value;
        if (pass === '1111') {
            nextStep('step-employee-main');
        } else if (pass === '6852') {
            nextStep('step-admin');
            loadAdminData();
        } else {
            alert('Nesprávné heslo!');
        }
    }

    function saveNameAndGoNext() {
        const name = document.getElementById('cust-name').value.trim();
        const surname = document.getElementById('cust-surname').value.trim();
        if (!name || !surname) {
            alert('Vyplňte jméno a příjmení!');
            return;
        }
        window.currentBooking.jmeno = name;
        window.currentBooking.prijmeni = surname;
        nextStep('step-travel-details');
    }

    function generateHotels() {
        window.currentBooking.zeme = document.getElementById('travel-country').value;
        window.currentBooking.pocetOsob = document.getElementById('count-total').value;
        window.currentBooking.dospeli = document.getElementById('count-adults').value;
        window.currentBooking.deti = document.getElementById('count-kids').value;
        window.currentBooking.pocetDni = document.getElementById('travel-days').value;

        // Výpočet příletového dne ze soboty
        const dnyTyzdna = ["Neděle", "Pondělí", "Úterý", "Středa", "Čtvrtek", "Pátek", "Sobota"];
        let priletDenIndex = (6 + parseInt(window.currentBooking.pocetDni)) % 7;

        window.currentBooking.odlet = `Sobota v 06:15 z Prahy`;
        window.currentBooking.prilep = `${dnyTyzdna[priletDenIndex]} v ${(Math.floor(Math.random() * 6) + 14)}:40 zpět do Prahy`;

        const zeme = window.currentBooking.zeme;
        const hotely = [
            { nazev: `Hotel Grand ${zeme} Resort`, cena: (Math.floor(Math.random() * 4000) + 11000) },
            { nazev: `${zeme} Family Beach & Spa`, cena: (Math.floor(Math.random() * 6000) + 16000) }
        ];

        const listDiv = document.getElementById('hotels-list');
        listDiv.innerHTML = '';

        hotely.forEach(hotel => {
            const card = document.createElement('div');
            card.className = 'hotel-card';
            card.innerHTML = `
                <h3>${hotel.nazev}</h3>
                <p><strong>Cena:</strong> ${hotel.cena} Kč / osoba</p>
                <p><strong>Let tam:</strong> ${window.currentBooking.odlet}</p>
                <p><strong>Let zpět:</strong> ${window.currentBooking.prilep}</p>
                <button onclick="bookHotel('${hotel.nazev}', ${hotel.cena})">Zabookovat</button>
            `;
            listDiv.appendChild(card);
        });
        nextStep('step-hotels');
    }

    function bookHotel(hotelNazev, cena) {
        window.currentBooking.hotel = hotelNazev;
        window.currentBooking.cenaCelkem = cena * parseInt(window.currentBooking.pocetOsob);

        if (db) {
            db.ref('rezervace').push(window.currentBooking)
                .then(() => nextStep('step-success'))
                .catch(() => saveOffline());
        } else {
            saveOffline();
        }
    }

    function saveOffline() {
        let data = JSON.parse(localStorage.getItem('local_rezervace') || '{}');
        data['id_' + Date.now()] = window.currentBooking;
        localStorage.setItem('local_rezervace', JSON.stringify(data));
        nextStep('step-success');
    }

    function loadAdminData() {
        const listEl = document.getElementById('admin-bookings-list');
        listEl.innerHTML = '';

        const zobraziData = (data) => {
            if (!data) {
                listEl.innerHTML = '<li>Zatím žádné rezervace.</li>';
                return;
            }
            let i = 1;
            for (let key in data) {
                const b = data[key];
                const li = document.createElement('li');
                li.className = 'booking-item';
                li.innerHTML = `Dovolená ${i} (${b.jmeno} ${b.prijmeni} - ${b.zeme})`;

                const details = document.createElement('div');
                details.className = 'booking-details';
                details.innerHTML = `
                    <p><strong>Hotel:</strong> ${b.hotel}</p>
                    <p><strong>Počet osob:</strong> ${b.pocetOsob} (Dospělí: ${b.dospeli}, Děti: ${b.deti})</p>
                    <p><strong>Délka pobytu:</strong> ${b.pocetDni} dní</p>
                    <p><strong>Odlet:</strong> ${b.odlet}</p>
                    <p><strong>Přílet:</strong> ${b.prilep}</p>
                    <p><strong>Celková cena:</strong> ${b.cenaCelkem} Kč</p>
                `;

                li.onclick = function(e) {
                    if (e.target.className !== 'booking-details' && e.target.tagName !== 'P') {
                        const d = details.style.display;
                        details.style.display = d === 'block' ? 'none' : 'block';
                    }
                };

                li.appendChild(details);
                listEl.appendChild(li);
                i++;
            }
        };

        if (db) {
            db.ref('rezervace').on('value', (snapshot) => {
                if(snapshot.exists()) zobraziData(snapshot.val());
                else zobraziData(JSON.parse(localStorage.getItem('local_rezervace')));
            });
        } else {
            zobraziData(JSON.parse(localStorage.getItem('local_rezervace')));
        }
    }
</script>

</body>
</html>
